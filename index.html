<!DOCTYPE html>
<html lang="en"> 
<head>
  <meta charset="UTF-8">   
  <title>Cyber Bot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head> 

<body>    

  <!-- مكان ظهور البوت -->
  <div id="CyberBotI" style="width:100%; height:100vh;"></div>

  <!-- التقاط participant_id من الرابط -->
  <script> 
    const params = new URLSearchParams(window.location.search);
    const pid = params.get('participant_id');
    window.participant_id = pid ? String(pid) : '';
  </script>

  <!-- كود Voiceflow (محفوظ كما هو + إضافة launch فقط) -->
 <script type="text/javascript">
  (function(d, t) {
      var v = d.createElement(t), s = d.getElementsByTagName(t)[0];
      v.onload = function() {
        window.voiceflow.chat.load({
          verify: { projectID: '6a1dfcc21bd221f955f41308' },
          url: 'https://general-runtime.voiceflow.com',
          versionID: 'production',
          voice: {
            url: "https://runtime-api.voiceflow.com"
          },
          render: {
            mode: 'embedded',
            target: document.getElementById('CyberBotI')
          }
        });
      }
      v.src = "https://cdn.voiceflow.com/widget-next/bundle.mjs"; v.type = "text/javascript"; s.parentNode.insertBefore(v, s);
  })(document, 'script');
</script>

 <!--  كود ( يرسل اشارة انه اذا انتهى البوت يظهر زر المتابعة للقسم التالي (استبيان بعد التجربة) -حاليا كود اختبار فقط --> 
<script>
let botFinishedSent = false;

function getVisibleText(root) {
  let text = "";

  function walk(node) {
    if (!node) return;

    if (node.nodeType === Node.TEXT_NODE) {
      text += " " + node.textContent;
      return;
    }

    if (node.nodeType !== Node.ELEMENT_NODE && node.nodeType !== Node.DOCUMENT_NODE && node.nodeType !== Node.DOCUMENT_FRAGMENT_NODE) {
      return;
    }

    const tag = node.tagName;
    if (tag === "SCRIPT" || tag === "STYLE" || tag === "NOSCRIPT") {
      return;
    }

    if (node.shadowRoot) {
      walk(node.shadowRoot);
    }

    node.childNodes.forEach(walk);
  }

  walk(root);

  return text.replace(/\s+/g, " ").trim();
}

function checkFinishMessage() {
  if (botFinishedSent) return;

  const text = getVisibleText(document.body);

  console.log("VISIBLE TEXT:", text);

  if (
    text.includes("To get paid") &&
    text.includes("next section of the survey")
  ) {
    botFinishedSent = true;

    console.log("BOT_FINISHED SENT");

    window.parent.postMessage("BOT_FINISHED", "*");
  }
}

setInterval(checkFinishMessage, 1000);
</script>
</body>
</html>
